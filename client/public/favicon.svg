<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle with sky gradient -->
  <circle cx="16" cy="16" r="15" fill="url(#skyGradient)" stroke="#93c5fd" stroke-width="2"/>
  
  <!-- Sun -->
  <circle cx="24" cy="8" r="4" fill="#fbbf24" opacity="0.95"/>
  <path d="M24 2v2M29.66 5.34l-1.41 1.41M32 8h-2M29.66 10.66l-1.41-1.41M24 14v-2M18.34 10.66l1.41-1.41M16 8h2M18.34 5.34l1.41 1.41" stroke="#f59e0b" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Running child figure -->
  <!-- Head -->
  <circle cx="12" cy="12" r="2.5" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.8"/>
  
  <!-- Body -->
  <ellipse cx="12" cy="17" rx="2" ry="3" fill="#3b82f6" opacity="0.9"/>
  
  <!-- Arms (in running motion) -->
  <path d="M10 15l-2 1.5" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M14 16l2 -1" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round"/>
  
  <!-- Legs (running stride) -->
  <path d="M11 20l-1.5 3" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <path d="M13 20l2 2.5" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Motion lines for running effect -->
  <path d="M6 18h3M5 20h2.5M6.5 22h2" stroke="#94a3b8" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Ground/grass -->
  <path d="M2 26c8-1 16-1 28 0" stroke="#22c55e" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M4 27h1M8 27h1M12 27h1M18 27h1M22 27h1M26 27h1" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcfce7;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>